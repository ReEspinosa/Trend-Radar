<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Radar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: #f4f0e6;
          color: #2c2a24;
          min-height: 100vh;
        }

        header {
          background: #ffffff;
          padding: 16px 28px;
          border-bottom: 1px solid #e0d8c4;
          display: flex;
          align-items: center;
          justify-content: space-between;
        }

        .logo { font-size: 1.1rem; font-weight: 700; color: #5a6e2e; letter-spacing: -0.3px; }
        .date-label { font-size: 0.78rem; color: #aaa; }

        .nav {
          display: flex;
          gap: 0;
          background: #ffffff;
          border-bottom: 1px solid #e0d8c4;
          padding: 0 28px;
        }

        .nav-btn {
          padding: 12px 24px;
          font-size: 0.84rem;
          font-weight: 600;
          color: #aaa;
          cursor: pointer;
          border-bottom: 2px solid transparent;
          transition: all 0.18s;
          background: none;
          border-top: none;
          border-left: none;
          border-right: none;
        }

        .nav-btn.active {
          color: #c45e1a;
          border-bottom-color: #c45e1a;
        }

        .panel { display: none; padding: 28px; }
        .panel.active { display: block; }

        /* FEED */
        .section-label {
          font-size: 0.7rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1.2px;
          color: #5a6e2e;
          margin-bottom: 12px;
        }

        .news-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

        .news-card {
          background: #ffffff;
          border: 1px solid #e4dece;
          border-radius: 10px;
          padding: 14px 16px;
          display: flex;
          gap: 14px;
          text-decoration: none;
          color: inherit;
          transition: border-color 0.18s, box-shadow 0.18s;
        }

        .news-card:hover {
          border-color: #c45e1a;
          box-shadow: 0 2px 10px rgba(196,94,26,0.08);
        }

        .news-card img {
          width: 72px;
          height: 62px;
          border-radius: 7px;
          object-fit: cover;
          flex-shrink: 0;
        }

        .news-info { flex: 1; }

        .news-title {
          font-size: 0.85rem;
          font-weight: 600;
          line-height: 1.45;
          margin-bottom: 7px;
          display: -webkit-box;
          -webkit-line-clamp: 2;
          -webkit-box-orient: vertical;
          overflow: hidden;
        }

        .news-meta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
        .source { font-size: 0.7rem; color: #bbb; }

        .badge {
          font-size: 0.67rem;
          padding: 2px 8px;
          border-radius: 20px;
          font-weight: 700;
        }

        .badge-high { background: #fdecd8; color: #c45e1a; }
        .badge-mid  { background: #eaf0d8; color: #5a6e2e; }
        .badge-low  { background: #f4f0e6; color: #bbb; border: 1px solid #e0d8c4; }

        .divider {
          display: flex;
          align-items: center;
          gap: 10px;
          color: #ccc;
          font-size: 0.72rem;
          margin: 4px 0 18px;
        }
        .divider::before, .divider::after {
          content: ''; flex: 1; height: 1px; background: #e4dece;
        }

        /* CALENDAR */
        .cal-wrap { display: flex; gap: 0; position: relative; }

        .cal-main { flex: 1; }

        .day-names {
          display: grid;
          grid-template-columns: 36px repeat(7, 1fr);
          gap: 2px;
          margin-bottom: 3px;
        }

        .day-name {
          text-align: center;
          font-size: 0.67rem;
          font-weight: 700;
          color: #5a6e2e;
          text-transform: uppercase;
          padding: 4px 0;
        }

        .cal-grid {
          display: grid;
          grid-template-columns: 36px repeat(7, 1fr);
          gap: 2px;
        }

        .week-num {
          display: flex;
          align-items: flex-start;
          justify-content: center;
          padding-top: 8px;
          font-size: 0.62rem;
          color: #ccc;
          font-weight: 600;
        }

        .cal-cell {
          background: #ffffff;
          border: 1px solid #e4dece;
          border-radius: 8px;
          padding: 6px 7px;
          min-height: 70px;
          cursor: pointer;
          transition: border-color 0.15s, box-shadow 0.15s;
          position: relative;
        }

        .cal-cell:hover { border-color: #c45e1a; box-shadow: 0 2px 8px rgba(196,94,26,0.1); }

        .cal-cell.today {
          border-color: #c45e1a;
          background: #fff8f3;
        }

        .cal-cell.selected {
          border-color: #5a6e2e;
          background: #f4f8ea;
          box-shadow: 0 2px 10px rgba(90,110,46,0.12);
        }

        .cal-cell.other-month { opacity: 0.3; pointer-events: none; }
        .cal-cell.high-trend { border-left: 3px solid #c45e1a; }
        .cal-cell.mid-trend  { border-left: 3px solid #d4a96a; }

        .day-num {
          font-size: 0.78rem;
          font-weight: 700;
          color: #2c2a24;
          margin-bottom: 4px;
        }

        .cal-cell.today .day-num { color: #c45e1a; }
        .cal-cell.selected .day-num { color: #5a6e2e; }

        .chips { display: flex; flex-wrap: wrap; gap: 2px; }

        .chip {
          font-size: 0.55rem;
          padding: 1px 5px;
          background: #fdecd8;
          color: #c45e1a;
          border-radius: 10px;
          max-width: 85px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .empty-cell { background: transparent; border: none; min-height: 70px; }

        /* SIDE PANEL */
        .side-panel {
          width: 0;
          overflow: hidden;
          transition: width 0.25s ease;
          background: #ffffff;
          border-left: 1px solid #e4dece;
          border-radius: 0 12px 12px 0;
        }

        .side-panel.open { width: 280px; }

        .side-inner { padding: 20px; width: 280px; }

        .side-date {
          font-size: 0.75rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1px;
          color: #c45e1a;
          margin-bottom: 4px;
        }

        .side-topics { margin-bottom: 16px; }

        .side-topic-chip {
          display: inline-block;
          font-size: 0.7rem;
          padding: 3px 9px;
          background: #fdecd8;
          color: #c45e1a;
          border-radius: 20px;
          margin: 2px 2px 2px 0;
        }

        .side-section-label {
          font-size: 0.68rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1px;
          color: #5a6e2e;
          margin: 14px 0 8px;
        }

        .todo-input-row {
          display: flex;
          gap: 6px;
          margin-bottom: 10px;
        }

        .todo-input {
          flex: 1;
          padding: 7px 10px;
          border: 1px solid #e4dece;
          border-radius: 7px;
          font-size: 0.8rem;
          background: #f4f0e6;
          color: #2c2a24;
          outline: none;
        }

        .todo-input:focus { border-color: #c45e1a; background: #fff; }

        .add-btn {
          padding: 7px 12px;
          background: #c45e1a;
          color: white;
          border: none;
          border-radius: 7px;
          font-size: 0.8rem;
          font-weight: 600;
          cursor: pointer;
        }

        .add-btn:hover { background: #a84d14; }

        .todo-list { display: flex; flex-direction: column; gap: 6px; }

        .todo-item {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 8px 10px;
          background: #f4f0e6;
          border-radius: 7px;
          font-size: 0.8rem;
        }

        .todo-item input[type="checkbox"] { accent-color: #5a6e2e; cursor: pointer; }

        .todo-item.done span { text-decoration: line-through; color: #bbb; }

        .todo-item .del-btn {
          margin-left: auto;
          background: none;
          border: none;
          color: #ccc;
          cursor: pointer;
          font-size: 0.9rem;
          padding: 0 2px;
        }

        .todo-item .del-btn:hover { color: #c45e1a; }

        .notes-area {
          width: 100%;
          padding: 8px 10px;
          border: 1px solid #e4dece;
          border-radius: 7px;
          font-size: 0.78rem;
          background: #f4f0e6;
          color: #2c2a24;
          resize: vertical;
          min-height: 80px;
          outline: none;
          font-family: inherit;
        }

        .notes-area:focus { border-color: #5a6e2e; background: #fff; }

        .close-panel {
          float: right;
          background: none;
          border: none;
          font-size: 1.1rem;
          cursor: pointer;
          color: #ccc;
          margin-bottom: 8px;
        }

        .close-panel:hover { color: #c45e1a; }

        .loading { text-align: center; padding: 30px; color: #bbb; font-size: 0.85rem; }
        .dot { animation: blink 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

        .legend {
          display: flex;
          gap: 14px;
          margin-bottom: 14px;
          font-size: 0.7rem;
          color: #aaa;
        }

        .legend-bar {
          display: inline-block;
          width: 3px;
          height: 11px;
          border-radius: 2px;
          margin-right: 5px;
          vertical-align: middle;
        }
    </style>
</head>
<body>

<header>
    <span class="logo">Trend Radar</span>
    <span class="date-label" id="date-label"></span>
</header>

<div class="nav">
    <button class="nav-btn active" onclick="showTab('feed')">Noticias</button>
    <button class="nav-btn" onclick="showTab('calendar')">Calendario</button>
</div>

<!-- FEED -->
<div id="feed" class="panel active">
    <div class="section-label">Recientes</div>
    <div class="news-list" id="news-feed">
        <div class="loading">Cargando<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    </div>
    <div class="divider">Más noticias</div>
    <div class="news-list" id="yesterday-feed">
        <div class="loading">Cargando<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    </div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="panel">
    <div class="legend">
        <span><span class="legend-bar" style="background:#c45e1a;"></span>Alta tendencia</span>
        <span><span class="legend-bar" style="background:#d4a96a;"></span>Tendencia media</span>
    </div>
    <div class="cal-wrap">
        <div class="cal-main">
            <div class="day-names">
                <div></div>
                <div class="day-name">Lun</div>
                <div class="day-name">Mar</div>
                <div class="day-name">Mié</div>
                <div class="day-name">Jue</div>
                <div class="day-name">Vie</div>
                <div class="day-name">Sáb</div>
                <div class="day-name">Dom</div>
            </div>
            <div class="cal-grid" id="cal-grid">
                <div class="loading" style="grid-column:1/-1">Cargando<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
            </div>
        </div>
        <div class="side-panel" id="side-panel">
            <div class="side-inner">
                <button class="close-panel" onclick="closePanel()">✕</button>
                <div class="side-date" id="side-date"></div>
                <div class="side-topics" id="side-topics"></div>

                <div class="side-section-label">Tareas</div>
                <div class="todo-input-row">
                    <input class="todo-input" id="todo-input" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter') addTodo()">
                    <button class="add-btn" onclick="addTodo()">+</button>
                </div>
                <div class="todo-list" id="todo-list"></div>

                <div class="side-section-label">Notas</div>
                <textarea class="notes-area" id="notes-area" placeholder="Escribe tus ideas aquí..." oninput="saveNotes()"></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const DAYS_ES = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
    const today = new Date();
    document.getElementById("date-label").textContent =
      `${today.getDate()} de ${MONTHS[today.getMonth()]} ${today.getFullYear()}`;

    // Storage en memoria (sin localStorage)
    const dayData = {};
    let selectedDay = null;
    let calendarData = null;

    function showTab(name) {
      document.querySelectorAll('.nav-btn').forEach((b,i) => {
        b.classList.toggle('active', ['feed','calendar'][i] === name);
      });
      document.querySelectorAll('.panel').forEach(p => {
        p.classList.toggle('active', p.id === name);
      });
    }

    function scoreBadge(score) {
      if (score >= 8) return `<span class="badge badge-high">${score} pts</span>`;
      if (score >= 4) return `<span class="badge badge-mid">${score} pts</span>`;
      return `<span class="badge badge-low">${score} pts</span>`;
    }

    function renderNews(articles, containerId) {
      const el = document.getElementById(containerId);
      if (!articles || !articles.length) {
        el.innerHTML = '<div class="loading">Sin noticias disponibles</div>';
        return;
      }
      el.innerHTML = articles.map(a => `
        <a class="news-card" href="${a.url}" target="_blank">
          ${a.image ? `<img src="${a.image}" alt="" onerror="this.style.display='none'">` : ''}
          <div class="news-info">
            <div class="news-title">${a.title}</div>
            <div class="news-meta">
              <span class="source">${a.source}</span>
              ${scoreBadge(a.score)}
            </div>
          </div>
        </a>`).join('');
    }

    function getWeekForDay(day, month, year) {
      if (!calendarData) return null;
      const firstDay = new Date(year, month, 1);
      let startDow = firstDay.getDay() - 1;
      if (startDow < 0) startDow = 6;
      const dayIndex = startDow + day - 1;
      return Math.floor(dayIndex / 7) + 1;
    }

    function renderCalendar(data) {
      calendarData = data;
      const grid = document.getElementById('cal-grid');
      const year = data.year;
      const month = data.month - 1;
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const totalDays = lastDay.getDate();

      let startDow = firstDay.getDay() - 1;
      if (startDow < 0) startDow = 6;

      const weekTopics = {};
      data.weeks.forEach(w => {
        weekTopics[w.week] = { topics: w.seasonal_topics, score: w.trending_score };
      });

      let html = '';
      let dayCount = 1;
      let weekNum = 1;
      let cellsInRow = 0;

      html += `<div class="week-num">S1</div>`;

      for (let i = 0; i < startDow; i++) {
        html += `<div class="empty-cell"></div>`;
        cellsInRow++;
      }

      while (dayCount <= totalDays) {
        const isToday = dayCount === today.getDate() && month === today.getMonth() && year === today.getFullYear();
        const wData = weekTopics[weekNum] || { topics: [], score: 'medio' };
        const trendClass = wData.score === 'alto' ? 'high-trend' : 'mid-trend';
        const chips = wData.topics.slice(0, 2).map(t =>
          `<span class="chip">${t}</span>`).join('');
        const d = dayCount;

        html += `
          <div class="cal-cell ${isToday ? 'today' : ''} ${trendClass}" onclick="openDay(${d}, ${month}, ${year})">
            <div class="day-num">${d}</div>
            <div class="chips">${chips}</div>
          </div>`;

        cellsInRow++;
        dayCount++;

        if (cellsInRow === 7 && dayCount <= totalDays) {
          weekNum++;
          html += `<div class="week-num">S${weekNum}</div>`;
          cellsInRow = 0;
        }
      }

      grid.innerHTML = html;
    }

    function openDay(day, month, year) {
      selectedDay = `${year}-${month}-${day}`;

      // Marcar celda seleccionada
      document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
      event.currentTarget.classList.add('selected');

      // Fecha en panel
      const d = new Date(year, month, day);
      const dayName = DAYS_ES[d.getDay() === 0 ? 6 : d.getDay() - 1];
      document.getElementById('side-date').textContent =
        `${dayName} ${day} de ${MONTHS[month]}`;

      // Topics de esa semana
      const weekNum = getWeekForDay(day, month, year);
      const wData = calendarData?.weeks?.find(w => w.week === weekNum);
      const topicsHtml = wData ? wData.seasonal_topics.map(t =>
        `<span class="side-topic-chip">${t}</span>`).join('') : '';
      document.getElementById('side-topics').innerHTML = topicsHtml;

      // Cargar tareas y notas guardadas
      if (!dayData[selectedDay]) dayData[selectedDay] = { todos: [], notes: '' };
      renderTodos();
      document.getElementById('notes-area').value = dayData[selectedDay].notes;

      document.getElementById('side-panel').classList.add('open');
    }

    function closePanel() {
      document.getElementById('side-panel').classList.remove('open');
      document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
      selectedDay = null;
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text || !selectedDay) return;
      dayData[selectedDay].todos.push({ text, done: false });
      input.value = '';
      renderTodos();
    }

    function toggleTodo(index) {
      dayData[selectedDay].todos[index].done = !dayData[selectedDay].todos[index].done;
      renderTodos();
    }

    function deleteTodo(index) {
      dayData[selectedDay].todos.splice(index, 1);
      renderTodos();
    }

    function renderTodos() {
      const list = document.getElementById('todo-list');
      const todos = dayData[selectedDay]?.todos || [];
      if (!todos.length) {
        list.innerHTML = `<div style="font-size:0.75rem;color:#ccc;padding:6px 0;">Sin tareas aún</div>`;
        return;
      }
      list.innerHTML = todos.map((t, i) => `
        <div class="todo-item ${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${i})">
          <span>${t.text}</span>
          <button class="del-btn" onclick="deleteTodo(${i})">✕</button>
        </div>`).join('');
    }

    function saveNotes() {
      if (!selectedDay) return;
      dayData[selectedDay].notes = document.getElementById('notes-area').value;
    }

    // Cargar datos
    fetch('/news/yesterday')
      .then(r => r.json())
      .then(d => {
        renderNews(d.slice(0, 7), 'news-feed');
        renderNews(d.slice(7), 'yesterday-feed');
      })
      .catch(() => {
        document.getElementById('news-feed').innerHTML = '<div class="loading">Error cargando noticias</div>';
      });

    fetch('/trends/calendar')
      .then(r => r.json())
      .then(d => renderCalendar(d));
</script>
</body>
</html>
